<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capital Conversion Convo</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            line-height: 1.5;
        }

        .section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background: #f0f0f0;
            border-radius: 50%;
            font-size: 13px;
            font-weight: 600;
        }

        .question {
            margin-bottom: 24px;
        }

        .question-label {
            display: block;
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: 500;
            color: #333;
        }

        .radio-group, .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-option, .checkbox-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .radio-option:hover, .checkbox-option:hover {
            border-color: #999;
            background: #fafafa;
        }

        .radio-option input, .checkbox-option input {
            cursor: pointer;
        }

        .radio-option.selected, .checkbox-option.selected {
            border-color: #1a1a1a;
            background: #f5f5f5;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 15px;
            resize: vertical;
            min-height: 80px;
        }

        textarea:focus {
            outline: none;
            border-color: #1a1a1a;
        }

        .button {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .button:hover {
            background: #333;
        }

        .button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .button-secondary {
            background: white;
            color: #1a1a1a;
            border: 1px solid #e0e0e0;
            margin-right: 12px;
        }

        .button-secondary:hover {
            background: #fafafa;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #f0f0f0;
        }

        .progress {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
        }

        .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e0e0e0;
        }

        .progress-dot.active {
            background: #1a1a1a;
        }

        .progress-dot.completed {
            background: #666;
        }

        /* Report Styles */
        .report {
            padding-top: 20px;
        }

        .first-sentence {
            font-size: 18px;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 40px;
            padding: 24px;
            background: #f8f8f8;
            border-radius: 8px;
            border-left: 4px solid #1a1a1a;
        }

        .report-section {
            margin-bottom: 36px;
            padding-bottom: 36px;
            border-bottom: 1px solid #f0f0f0;
        }

        .report-section:last-child {
            border-bottom: none;
        }

        .report-section h3 {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1a1a1a;
        }

        .report-section p {
            font-size: 15px;
            line-height: 1.7;
            color: #333;
            margin-bottom: 12px;
        }

        .investor-types {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }

        .investor-card {
            padding: 16px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
        }

        .investor-card.now {
            background: #f0fdf4;
            border-color: #86efac;
        }

        .investor-card.later {
            background: #fef2f2;
            border-color: #fca5a5;
        }

        .investor-card-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #666;
        }

        .investor-card-type {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .copy-button {
            margin-top: 24px;
        }

        .confidence-reframe {
            font-size: 15px;
            line-height: 1.7;
            padding: 20px;
            background: #fafafa;
            border-radius: 6px;
            font-style: italic;
            color: #555;
        }

        .prep-highlight {
            background: #fffbeb;
            padding: 20px;
            border-radius: 6px;
            border-left: 4px solid #fbbf24;
            margin-top: 12px;
        }

        .prep-highlight p {
            font-weight: 500;
            color: #92400e;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [currentStep, setCurrentStep] = useState(0);
            const [answers, setAnswers] = useState({
                // Section A
                buildingWhat: '',
                primaryCustomer: '',
                revenueStatus: '',
                
                // Section B
                evidenceTypes: [],
                meaningfulChange: '',
                
                // Section C
                investorTypes: '',
                conversationEnds: '',
                nextStepAsked: '',
                
                // Section D
                investorEvaluating: '',
                strongestAsset: '',
                
                // Report / Follow-up (Optional)
                followUpEmail: ''
            });

            // Load from localStorage on mount
            useEffect(() => {
                const saved = localStorage.getItem('ccc-answers');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setAnswers(parsed);
                    } catch (e) {
                        console.error('Failed to load saved answers');
                    }
                }
            }, []);

            // Save to localStorage on change
            useEffect(() => {
                localStorage.setItem('ccc-answers', JSON.stringify(answers));
            }, [answers]);

            const updateAnswer = (key, value) => {
                setAnswers(prev => ({ ...prev, [key]: value }));
            };

            const toggleEvidence = (value) => {
                setAnswers(prev => {
                    const current = prev.evidenceTypes || [];

                    // If selecting "None yet", clear everything else
                    if (value === 'None yet') {
                        return { ...prev, evidenceTypes: current.includes('None yet') ? [] : ['None yet'] };
                    }

                    // If selecting anything else, remove "None yet" if present
                    const withoutNone = current.filter(v => v !== 'None yet');

                    if (withoutNone.includes(value)) {
                        return { ...prev, evidenceTypes: withoutNone.filter(v => v !== value) };
                    } else if (withoutNone.length < 2) {
                        return { ...prev, evidenceTypes: [...withoutNone, value] };
                    }
                    return prev;
                });
            };

            const canProceed = () => {
                switch(currentStep) {
                    case 0: // Section A
                        return answers.buildingWhat && answers.primaryCustomer && answers.revenueStatus;
                    case 1: // Section B
                        return answers.evidenceTypes.length > 0 && answers.meaningfulChange.trim();
                    case 2: // Section C
                        return answers.investorTypes && answers.conversationEnds && answers.nextStepAsked;
                    case 3: // Section D
                        return answers.investorEvaluating && answers.strongestAsset;
                    default:
                        return false;
                }
            };

            const next = () => {
                if (canProceed()) {
                    setCurrentStep(prev => prev + 1);
                    window.scrollTo(0, 0);
                }
            };

            const back = () => {
                setCurrentStep(prev => prev - 1);
                window.scrollTo(0, 0);
            };

            const copyReport = () => {
                const reportElement = document.querySelector('.report');
                const text = reportElement.innerText;
                navigator.clipboard.writeText(text);
                alert('Report copied to clipboard');
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>Capital Conversion Convo</h1>
                        <p className="subtitle">
                            A diagnostic system to explain why founder–investor conversations stall and what should change next.
                            <br />
                            <span style={{ display: 'inline-block', marginTop: '8px', color: '#777', fontSize: '14px' }}>
                                Takes ~8–10 minutes. No account required. Answers are saved only in your browser.
                            </span>
                        </p>
                    </div>

                    {currentStep < 4 && (
                        <div className="progress">
                            {[0, 1, 2, 3].map(i => (
                                <div 
                                    key={i}
                                    className={`progress-dot ${i === currentStep ? 'active' : ''} ${i < currentStep ? 'completed' : ''}`}
                                />
                            ))}
                        </div>
                    )}

                    {currentStep === 0 && <SectionA answers={answers} updateAnswer={updateAnswer} />}
                    {currentStep === 1 && <SectionB answers={answers} updateAnswer={updateAnswer} toggleEvidence={toggleEvidence} />}
                    {currentStep === 2 && <SectionC answers={answers} updateAnswer={updateAnswer} />}
                    {currentStep === 3 && <SectionD answers={answers} updateAnswer={updateAnswer} />}
                    {currentStep === 4 && <Report answers={answers} copyReport={copyReport} setCurrentStep={setCurrentStep} updateAnswer={updateAnswer} />}

                    {currentStep < 4 && (
                        <div className="navigation">
                            <div>
                                {currentStep > 0 && (
                                    <button onClick={back} className="button button-secondary">
                                        Back
                                    </button>
                                )}
                            </div>
                            <button 
                                onClick={next} 
                                className="button"
                                disabled={!canProceed()}
                            >
                                {currentStep === 3 ? 'Generate Diagnosis' : 'Continue'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        function SectionA({ answers, updateAnswer }) {
            return (
                <div className="section">
                    <div className="section-title">
                        <span className="section-number">A</span>
                        Business Context
                    </div>

                    <div className="question">
                        <label className="question-label">1. What are you building?</label>
                        <div className="radio-group">
                            {['Hardware', 'Software', 'Marketplace', 'Service', 'Other'].map(option => (
                                <label 
                                    key={option}
                                    className={`radio-option ${answers.buildingWhat === option ? 'selected' : ''}`}
                                >
                                    <input
                                        type="radio"
                                        name="buildingWhat"
                                        value={option}
                                        checked={answers.buildingWhat === option}
                                        onChange={(e) => updateAnswer('buildingWhat', e.target.value)}
                                    />
                                    {option}
                                </label>
                            ))}
                        </div>
                    </div>

                    <div className="question">
                        <label className="question-label">2. Who is the primary customer?</label>
                        <div className="radio-group">
                            {['Consumer', 'SMB', 'Enterprise', 'Institution', 'Unclear'].map(option => (
                                <label 
                                    key={option}
                                    className={`radio-option ${answers.primaryCustomer === option ? 'selected' : ''}`}
                                >
                                    <input
                                        type="radio"
                                        name="primaryCustomer"
                                        value={option}
                                        checked={answers.primaryCustomer === option}
                                        onChange={(e) => updateAnswer('primaryCustomer', e.target.value)}
                                    />
                                    {option}
                                </label>
                            ))}
                        </div>
                    </div>

                    <div className="question">
                        <label className="question-label">3. Are you currently generating revenue?</label>
                        <div className="radio-group">
                            {['None', 'Pilots/LOIs', 'Early revenue', 'Repeat revenue', 'Scaled'].map(option => (
                                <label 
                                    key={option}
                                    className={`radio-option ${answers.revenueStatus === option ? 'selected' : ''}`}
                                >
                                    <input
                                        type="radio"
                                        name="revenueStatus"
                                        value={option}
                                        checked={answers.revenueStatus === option}
                                        onChange={(e) => updateAnswer('revenueStatus', e.target.value)}
                                    />
                                    {option}
                                </label>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function SectionB({ answers, updateAnswer, toggleEvidence }) {
            return (
                <div className="section">
                    <div className="section-title">
                        <span className="section-number">B</span>
                        Evidence Snapshot
                    </div>

                    <div className="question">
                        <label className="question-label">Select up to two statements that best describe your current proof:</label>
                        <div className="checkbox-group">
                            {[
                                'Working prototype',
                                'Paying customers',
                                'Active users',
                                'Partnerships or LOIs',
                                'Manufacturing readiness',
                                'Validated cost or time savings',
                                'None yet'
                            ].map(option => (
                                <label 
                                    key={option}
                                    className={`checkbox-option ${answers.evidenceTypes.includes(option) ? 'selected' : ''}`}
                                >
                                    <input
                                        type="checkbox"
                                        checked={answers.evidenceTypes.includes(option)}
                                        onChange={() => toggleEvidence(option)}
                                        disabled={!answers.evidenceTypes.includes(option) && answers.evidenceTypes.length >= 2}
                                    />
                                    {option}
                                </label>
                            ))}
                        </div>
                    </div>

                    <div className="question">
                        <label className="question-label">Briefly describe one meaningful change in the last 90 days:</label>
                        <textarea
                            value={answers.meaningfulChange}
                            onChange={(e) => updateAnswer('meaningfulChange', e.target.value)}
                            placeholder="E.g., 'Signed first pilot customer' or 'Completed prototype testing'"
                        />
                    </div>
                </div>
            );
        }

        function SectionC({ answers, updateAnswer }) {
            return (
                <div className="section">
                    <div className="section-title">
                        <span className="section-number">C</span>
                        Conversation History
                    </div>

                    <div className="question">
                        <label className="question-label">1. Who have you primarily spoken with?</label>
                        <div className="radio-group">
                            {['Angels', 'VCs', 'Strategics', 'Accelerators', 'Mixed'].map(option => (
                                <label 
                                    key={option}
                                    className={`radio-option ${answers.investorTypes === option ? 'selected' : ''}`}
                                >
                                    <input
                                        type="radio"
                                        name="investorTypes"
                                        value={option}
                                        checked={answers.investorTypes === option}
                                        onChange={(e) => updateAnswer('investorTypes', e.target.value)}
                                    />
                                    {option}
                                </label>
                            ))}
                        </div>
                    </div>

                    <div className="question">
                        <label className="question-label">2. How did most conversations end?</label>
                        <div className="radio-group">
                            {[
                                'Interest/no follow-up',
                                '"Check back later"',
                                'Explicit no',
                                'Mixed'
                            ].map(option => (
                                <label 
                                    key={option}
                                    className={`radio-option ${answers.conversationEnds === option ? 'selected' : ''}`}
                                >
                                    <input
                                        type="radio"
                                        name="conversationEnds"
                                        value={option}
                                        checked={answers.conversationEnds === option}
                                        onChange={(e) => updateAnswer('conversationEnds', e.target.value)}
                                    />
                                    {option}
                                </label>
                            ))}
                        </div>
                    </div>

                    <div className="question">
                        <label className="question-label">3. Did any investor clearly ask for a next step?</label>
                        <div className="radio-group">
                            {[
                                'Yes and followed up',
                                'Yes but couldn\'t provide',
                                'No',
                                'Unsure'
                            ].map(option => (
                                <label 
                                    key={option}
                                    className={`radio-option ${answers.nextStepAsked === option ? 'selected' : ''}`}
                                >
                                    <input
                                        type="radio"
                                        name="nextStepAsked"
                                        value={option}
                                        checked={answers.nextStepAsked === option}
                                        onChange={(e) => updateAnswer('nextStepAsked', e.target.value)}
                                    />
                                    {option}
                                </label>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function SectionD({ answers, updateAnswer }) {
            return (
                <div className="section">
                    <div className="section-title">
                        <span className="section-number">D</span>
                        Perceived Evaluation
                    </div>

                    <div className="question">
                        <label className="question-label">1. What do you believe investors were evaluating most?</label>
                        <div className="radio-group">
                            {[
                                'Scale',
                                'Execution',
                                'Credibility',
                                'Timing',
                                'Model clarity',
                                'Unsure'
                            ].map(option => (
                                <label 
                                    key={option}
                                    className={`radio-option ${answers.investorEvaluating === option ? 'selected' : ''}`}
                                >
                                    <input
                                        type="radio"
                                        name="investorEvaluating"
                                        value={option}
                                        checked={answers.investorEvaluating === option}
                                        onChange={(e) => updateAnswer('investorEvaluating', e.target.value)}
                                    />
                                    {option}
                                </label>
                            ))}
                        </div>
                    </div>

                    <div className="question">
                        <label className="question-label">2. What do you believe is currently your strongest asset?</label>
                        <div className="radio-group">
                            {[
                                'Vision',
                                'Execution',
                                'Demand',
                                'Ops readiness',
                                'Founder credibility'
                            ].map(option => (
                                <label 
                                    key={option}
                                    className={`radio-option ${answers.strongestAsset === option ? 'selected' : ''}`}
                                >
                                    <input
                                        type="radio"
                                        name="strongestAsset"
                                        value={option}
                                        checked={answers.strongestAsset === option}
                                        onChange={(e) => updateAnswer('strongestAsset', e.target.value)}
                                    />
                                    {option}
                                </label>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function Report({ answers, copyReport, setCurrentStep, updateAnswer }) {
            const diagnosis = generateDiagnosis(answers);

            return (
                <div className="report">
                    <div className="first-sentence">
                        {diagnosis.firstSentence}
                    </div>

                    <div className="report-section">
                        <h3>1. Primary Stall Diagnosis</h3>
                        <p>{diagnosis.stallDiagnosis}</p>
                    </div>

                    <div className="report-section">
                        <h3>2. Investor Type Fit</h3>
                        <div className="investor-types">
                            <div className="investor-card now">
                                <div className="investor-card-title">Best Fit Now</div>
                                <div className="investor-card-type">{diagnosis.investorNow}</div>
                            </div>
                            <div className="investor-card later">
                                <div className="investor-card-title">Premature Engagement</div>
                                <div className="investor-card-type">{diagnosis.investorLater}</div>
                            </div>
                        </div>
                        <p style={{marginTop: '16px'}}>{diagnosis.investorDifference}</p>
                    </div>

                    <div className="report-section">
                        <h3>3. What to Prepare Before the Next Conversation</h3>
                        <div className="prep-highlight">
                            <p>{diagnosis.preparation}</p>
                        </div>
                    </div>

                    <div className="report-section">
                        <h3>4. Confidence Reframe</h3>
                        <div className="confidence-reframe">
                            {diagnosis.confidenceReframe}
                        </div>
                    </div>

                    <div className="report-section">
                        <h3>Optional: Get a follow-up</h3>
                        <p style={{color:'#555'}}>
                            If you want a follow-up conversation or early access, drop your email. (Optional)
                        </p>
                        <input
                            type="email"
                            value={answers.followUpEmail || ''}
                            onChange={(e) => updateAnswer('followUpEmail', e.target.value)}
                            placeholder="you@example.com"
                            style={{
                                width: '100%',
                                padding: '12px',
                                border: '1px solid #e0e0e0',
                                borderRadius: '6px',
                                fontSize: '15px'
                            }}
                        />
                        <button
                            className="button button-secondary copy-button"
                            style={{marginTop:'12px'}}
                            onClick={() => {
                                const subject = encodeURIComponent('Capital Conversion Convo – Follow-up');
                                const body = encodeURIComponent(
                                    `Email: ${answers.followUpEmail}\n\nResults:\n\n${document.querySelector('.report').innerText}`
                                );
                                window.location.href = `mailto:YOUR_EMAIL_HERE?subject=${subject}&body=${body}`;
                            }}
                            disabled={!answers.followUpEmail}
                        >
                            Request Follow-up (Email)
                        </button>
                        <p style={{marginTop:'10px', fontSize:'13px', color:'#777'}}>
                            If the button doesn't open email, copy your report and send it to: jarrellagreen@gmail.com
                        </p>
                        <p style={{marginTop:'4px', fontSize:'13px', color:'#777'}}>
                            Note: Your answers are not stored on a server. This sends your results via email from your device.
                        </p>
                    </div>

                    <div className="navigation">
                        <button onClick={() => setCurrentStep(0)} className="button button-secondary">
                            Start Over
                        </button>
                        <button onClick={copyReport} className="button">
                            Copy Report
                        </button>
                    </div>
                </div>
            );
        }

        function generateDiagnosis(answers) {
            // Diagnostic logic based on answers
            const {
                buildingWhat,
                primaryCustomer,
                revenueStatus,
                evidenceTypes,
                meaningfulChange,
                investorTypes,
                conversationEnds,
                nextStepAsked,
                investorEvaluating,
                strongestAsset
            } = answers;

            // Default diagnosis object
            let diagnosis = {
                firstSentence: '',
                stallDiagnosis: '',
                investorNow: '',
                investorLater: '',
                investorDifference: '',
                preparation: '',
                confidenceReframe: 'Silence here reflects evaluation uncertainty, not rejection. Adjusting the conversation context is likely to change outcomes.'
            };

            // Determine primary misalignment
            const hasRevenue = revenueStatus !== 'None' && revenueStatus !== 'Pilots/LOIs';
            const hasProof = evidenceTypes.length > 0 && !evidenceTypes.includes('None yet');
            const earlyStage = !hasRevenue && (evidenceTypes.includes('Working prototype') || evidenceTypes.includes('None yet'));
            const growthStage = revenueStatus === 'Repeat revenue' || revenueStatus === 'Scaled';
            const talkingToVCs = investorTypes === 'VCs' || investorTypes === 'Mixed';
            const evaluatingScale = investorEvaluating === 'Scale' || investorEvaluating === 'Timing';
            const evaluatingExecution = investorEvaluating === 'Execution' || investorEvaluating === 'Model clarity';
            const strengthIsExecution = strongestAsset === 'Execution' || strongestAsset === 'Ops readiness';
            const strengthIsVision = strongestAsset === 'Vision';
            const hardwareOrPhysical = buildingWhat === 'Hardware' || buildingWhat === 'Service';
            const checkBackLater = conversationEnds === '"Check back later"';
            const interestNoFollowUp = conversationEnds === 'Interest/no follow-up';
            const couldntProvideNextStep = nextStepAsked === 'Yes but couldn\'t provide';

            // CORE DIAGNOSTIC LOGIC

            // Scenario 1: Early stage talking to scale-focused investors
            if (earlyStage && talkingToVCs && evaluatingScale) {
                diagnosis.firstSentence = "Your conversations are stalling because you're speaking to later-stage evaluators with early-stage signals, not because your progress is insufficient.";
                diagnosis.stallDiagnosis = "You're presenting execution proof to investors who are primarily evaluating scalability potential. VCs at this stage need to see a path to 10x+ returns, but your strongest evidence reduces execution risk rather than demonstrating market size or velocity. This creates interest without urgency.";
                diagnosis.investorNow = "Angel investors or pre-seed funds";
                diagnosis.investorLater = "Growth-stage VCs";
                diagnosis.investorDifference = "Angels bet on founder + early proof. Growth VCs bet on validated traction metrics. You're between these two evaluation frameworks.";
                diagnosis.preparation = "Reframe your prototype/early proof as evidence of scalable demand, not just technical feasibility. Show how current validation connects to repeatable customer acquisition.";
            }
            
            // Scenario 2: Strong execution, weak scale narrative
            else if (strengthIsExecution && evaluatingScale && !growthStage) {
                diagnosis.firstSentence = "Your conversations are stalling because investors are evaluating scalability while your strongest proof reduces execution risk, not because the idea lacks merit.";
                diagnosis.stallDiagnosis = "You've built credibility around your ability to execute, but investors aren't seeing how that execution translates to exponential growth. They're asking 'can this scale?' while you're answering 'can this work?' This misalignment creates respectful distance rather than momentum.";
                diagnosis.investorNow = "Strategics or industry-specific angels";
                diagnosis.investorLater = "Institutional VCs";
                diagnosis.investorDifference = "Strategics value execution efficiency and market knowledge. Institutional VCs need scalability proof before execution matters.";
                diagnosis.preparation = "Quantify the risk your progress has already removed and connect it to market expansion. Show why execution confidence enables scale, not just delivery.";
            }
            
            // Scenario 3: "Check back later" pattern
            else if (checkBackLater && !couldntProvideNextStep) {
                diagnosis.firstSentence = "Your conversations are stalling because investors see potential but lack a clear signal to re-engage, not because they're uninterested.";
                diagnosis.stallDiagnosis = "'Check back later' indicates genuine interest constrained by timing or stage uncertainty. Investors are waiting for a specific proof point but haven't explicitly named it, and you haven't offered a clear milestone that would justify reconvening. The relationship exists but lacks activation energy.";
                diagnosis.investorNow = "Angels who invest in momentum shifts";
                diagnosis.investorLater = "Traditional VCs waiting for de-risking";
                diagnosis.investorDifference = "Momentum-focused angels invest when trajectory changes. VCs wait for metrics that de-risk their thesis. 'Later' often means waiting for the latter.";
                diagnosis.preparation = "Define and communicate your next major milestone explicitly. Make it binary, time-bound, and relevant to investor concerns—then offer a specific re-engagement trigger.";
            }
            
            // Scenario 4: Interest but no follow-up + couldn't provide next step
            else if (interestNoFollowUp && couldntProvideNextStep) {
                diagnosis.firstSentence = "Your conversations are stalling because investors asked for proof you don't yet have, not because your current progress is invalid.";
                diagnosis.stallDiagnosis = "You're being asked for evidence that sits beyond your current stage—likely revenue traction, partnership contracts, or user metrics you haven't generated yet. This creates an evaluation gap where interest can't convert to commitment. The ask itself is useful signal about what matters.";
                diagnosis.investorNow = "Accelerators or milestone-based micro-funds";
                diagnosis.investorLater = "Traditional seed/Series A VCs";
                diagnosis.investorDifference = "Accelerators fund to help you get the proof. VCs fund once the proof exists. You're in the 'gap' phase where the former is more aligned.";
                diagnosis.preparation = "Clarify which specific proof point investors need and build a 90-day plan to generate it. Then re-engage with that plan as the 'ask,' not the proof itself.";
            }
            
            // Scenario 5: Hardware/service with unclear model
            else if (hardwareOrPhysical && (investorEvaluating === 'Model clarity' || investorEvaluating === 'Unsure')) {
                diagnosis.firstSentence = "Your conversations are stalling because your business model signal is weaker than your technical or operational proof, not because the opportunity isn't real.";
                diagnosis.stallDiagnosis = "Physical products and services require capital-intensive scaling, but investors can't yet see the unit economics or go-to-market path clearly enough to underwrite risk. Your competence is visible; your business architecture is not. This creates hedging behavior rather than conviction.";
                diagnosis.investorNow = "Strategic angels or industry operators";
                diagnosis.investorLater = "Generalist VCs";
                diagnosis.investorDifference = "Strategic angels can evaluate feasibility through domain knowledge. Generalist VCs need transparent models and margin clarity to compare against portfolio benchmarks.";
                diagnosis.preparation = "Make your unit economics and customer acquisition path explicit and repeatable. Show the margin structure and capital efficiency assumptions, even if early.";
            }
            
            // Scenario 6: Vision-led but unclear execution path
            else if (strengthIsVision && (evaluatingExecution || investorEvaluating === 'Credibility')) {
                diagnosis.firstSentence = "Your conversations are stalling because investors are drawn to the vision but uncertain about your path to deliver it, not because the vision itself is flawed.";
                diagnosis.stallDiagnosis = "You're compelling on the 'why' and 'what' but less clear on the 'how' and 'when.' Investors see the ambition but can't model the risk or timeline. This creates excitement without commitment—a dangerous place where momentum dies quietly.";
                diagnosis.investorNow = "Thesis-driven funds or mission-aligned angels";
                diagnosis.investorLater = "Stage-agnostic or growth VCs";
                diagnosis.investorDifference = "Thesis-driven investors bet early on direction and founder. Growth investors bet on executed milestones. You need the former before the latter will engage.";
                diagnosis.preparation = "Translate your vision into a sequenced 12-month execution plan with binary milestones. Show how near-term proof reduces long-term uncertainty.";
            }
            
            // Scenario 7: B2B/enterprise with early signals
            else if (primaryCustomer === 'Enterprise' && (evidenceTypes.includes('Partnerships or LOIs') || revenueStatus === 'Pilots/LOIs')) {
                diagnosis.firstSentence = "Your conversations are stalling because pilots and LOIs signal interest but don't yet prove revenue conversion, not because your approach is wrong.";
                diagnosis.stallDiagnosis = "Enterprise sales cycles are long, and investors know LOIs often don't convert. You're being evaluated on revenue proof you can't provide yet, creating a timing mismatch. Investors want to see contract signatures and payment, not just partnership intent.";
                diagnosis.investorNow = "B2B-focused angels or former operators";
                diagnosis.investorLater = "Institutional seed funds";
                diagnosis.investorDifference = "B2B angels understand pilot-to-contract timelines. Institutional funds need contracted ARR or clear sales velocity before they can move.";
                diagnosis.preparation = "Focus conversations on: sales cycle length, conversion expectations, and the specific milestone that turns a pilot into a contract. Frame LOIs as pipeline, not proof.";
            }
            
            // Default scenario: Generic stage/investor mismatch
            else {
                diagnosis.firstSentence = "Your conversations are stalling because there's a mismatch between the stage you're at and the evaluation criteria being applied, not because the idea lacks merit.";
                diagnosis.stallDiagnosis = "You're presenting signals that match one investment thesis while being evaluated against another. This often happens when founder confidence attracts higher-stage interest before the evidence supports it, or when the right investors haven't been identified yet. The conversations feel productive but don't convert.";
                diagnosis.investorNow = "Stage-appropriate angels or micro-VCs";
                diagnosis.investorLater = "Traditional institutional VCs";
                diagnosis.investorDifference = "Early investors bet on trajectory and founder potential. Later-stage investors bet on validated metrics. You're likely speaking to the latter prematurely.";
                diagnosis.preparation = "Clarify how current execution proof leads to scalable demand. Make your next 90-day milestone explicit and tied to a metric that matters to investors.";
            }

            return diagnosis;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
